name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv venv --python 3.12
      - run: uv pip install -e ".[dev]"
      - name: Ruff
        run: uv run ruff check flowly/

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv venv --python ${{ matrix.python }}
      - run: uv pip install -e ".[dev]"
      - name: Pytest
        # Live-LLM tests are marked `real_llm` and skipped by default
        # (no OPENROUTER_API_KEY in CI), so this stays hermetic.
        run: uv run pytest
