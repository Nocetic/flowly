name: install-windows

# Verifies the git-checkout installer actually works on Windows: clone +
# uv venv + editable install + launcher + `flowly update`'s "source" mode
# detection, then a second run to prove re-running the installer (the
# documented way to force-refresh) doesn't choke on its own prior output.
#
# Runs against THIS checkout (a local clone, not a hardcoded branch name) so
# it always tests the code actually being proposed, not a stale ref.

on:
  push:
    branches: [main, feat/git-install-update]  # TEMP: drop feat/git-install-update before merge
    paths:
      - "scripts/install.sh"
      - "scripts/install.ps1"
      - "flowly/cli/entry.py"
      - "flowly/cli/update_cmd.py"
      - "flowly/__main__.py"
      - ".github/workflows/install-windows.yml"
  pull_request:
    paths:
      - "scripts/install.sh"
      - "scripts/install.ps1"
      - "flowly/cli/entry.py"
      - "flowly/cli/update_cmd.py"
      - "flowly/__main__.py"
      - ".github/workflows/install-windows.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  install:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve a local branch name to clone (checkout may be detached)
        shell: pwsh
        run: |
          $branch = git rev-parse --abbrev-ref HEAD
          if ($branch -eq 'HEAD') {
            git checkout -B ci-install-test
            $branch = 'ci-install-test'
          }
          Write-Host "Testing branch: $branch"
          "INSTALL_TEST_BRANCH=$branch" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Run install.ps1 (clones this checkout into a temp src/venv)
        shell: pwsh
        env:
          FLOWLY_REPO_URL: ${{ github.workspace }}
          FLOWLY_BRANCH: ${{ env.INSTALL_TEST_BRANCH }}
          FLOWLY_SRC: ${{ runner.temp }}\flowly-src
          FLOWLY_VENV: ${{ runner.temp }}\flowly-venv
        run: |
          ./scripts/install.ps1 -SkipBootstrap -NoPathUpdate -SkipSystemDeps

      - name: Verify the install
        shell: pwsh
        env:
          FLOWLY_VENV: ${{ runner.temp }}\flowly-venv
        run: |
          $venvPy = Join-Path $env:FLOWLY_VENV 'Scripts\python.exe'
          Write-Host "--- venv python ---"
          & $venvPy --version
          Write-Host "--- flowly --version (via python -m) ---"
          & $venvPy -m flowly --version
          Write-Host "--- detect_install_mode ---"
          $mode = & $venvPy -c "from flowly.cli.update_cmd import detect_install_mode; print(detect_install_mode())"
          Write-Host "mode = $mode"
          if ($mode.Trim() -ne 'source') {
            throw "Expected install mode 'source', got '$mode'"
          }
          Write-Host "--- launcher (flowly.cmd) ---"
          $launcher = Join-Path $env:LOCALAPPDATA 'Flowly\bin\flowly.cmd'
          if (-not (Test-Path $launcher)) {
            throw "Launcher not found at $launcher"
          }
          & $launcher --version

      - name: Re-run install.ps1 (idempotency / re-run-to-update path)
        shell: pwsh
        env:
          FLOWLY_REPO_URL: ${{ github.workspace }}
          FLOWLY_BRANCH: ${{ env.INSTALL_TEST_BRANCH }}
          FLOWLY_SRC: ${{ runner.temp }}\flowly-src
          FLOWLY_VENV: ${{ runner.temp }}\flowly-venv
        run: |
          ./scripts/install.ps1 -SkipBootstrap -NoPathUpdate -SkipSystemDeps
